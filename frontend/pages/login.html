<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | EstateMaster</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#252e7e",
                        "background-light": "#f6f6f8",
                        "background-dark": "#13151f",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-4 no-underline">
                <div class="bg-primary p-2 rounded-lg">
                    <span class="material-symbols-outlined text-white">apartment</span>
                </div>
                <span
                    class="text-2xl font-display font-bold tracking-tight text-primary dark:text-white">EstateMaster</span>
            </a>
            <h1 class="text-3xl font-display font-black text-slate-900 dark:text-white mb-2">Welcome Back</h1>
            <p class="text-slate-500 dark:text-slate-400">Sign in to your account</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-800">
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="you@example.com" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="••••••••" />
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a href="register.html" class="text-primary font-semibold hover:underline">Sign up</a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html"
                class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
                ← Back to Home
            </a>
        </div>
    </div>

    <!-- Account Pending/Rejected Popup -->
    <div id="pending-popup" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md p-8 border border-slate-200 dark:border-slate-700 text-center">
            <div id="popup-icon" class="size-20 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mx-auto mb-5">
                <span class="material-symbols-outlined text-amber-500 text-5xl">pending_actions</span>
            </div>
            <h3 id="popup-title" class="text-2xl font-display font-black text-slate-900 dark:text-white mb-3">Account Under Review</h3>
            <p id="popup-message" class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6">
                Your account is still under review. Please wait for admin approval before signing in.
            </p>
            <button onclick="document.getElementById('pending-popup').classList.add('hidden'); document.getElementById('pending-popup').classList.remove('flex');"
                class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:opacity-90 transition-all">
                OK, Got It
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');

        function showPendingPopup(type) {
            const popup = document.getElementById('pending-popup');
            const icon = document.getElementById('popup-icon');
            const title = document.getElementById('popup-title');
            const message = document.getElementById('popup-message');

            if (type === 'rejected') {
                icon.className = 'size-20 bg-red-50 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-5';
                icon.innerHTML = '<span class="material-symbols-outlined text-red-500 text-5xl">cancel</span>';
                title.textContent = 'Account Not Approved';
                message.textContent = 'Your account request was not approved by the admin. Please contact support for more information.';
            } else {
                icon.className = 'size-20 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mx-auto mb-5';
                icon.innerHTML = '<span class="material-symbols-outlined text-amber-500 text-5xl">pending_actions</span>';
                title.textContent = 'Account Under Review';
                message.textContent = 'Your account is still under admin review. You will be notified once it is approved. Please check back later.';
            }

            popup.classList.remove('hidden');
            popup.classList.add('flex');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!isValidEmail(email)) {
                showToast('Please enter a valid email', 'error');
                return;
            }

            showLoader();

            try {
                const response = await AuthService.login(email, password);

                hideLoader();
                showToast('Login successful!', 'success');

                // Redirect based on role
                const user = AuthService.getUser();
                setTimeout(() => {
                    if (user.role === 'seller' || user.role === 'agent') {
                        window.location.href = 'seller-dashboard.html';
                    } else {
                        window.location.href = 'buyer-dashboard.html';
                    }
                }, 1000);
            } catch (error) {
                hideLoader();
                // Check for specific account status errors
                const errMsg = error.message || '';
                if (errMsg === 'account_pending' || errMsg.includes('account_pending')) {
                    showPendingPopup('pending');
                } else if (errMsg === 'account_rejected' || errMsg.includes('account_rejected')) {
                    showPendingPopup('rejected');
                } else {
                    showToast(error.message || 'Login failed', 'error');
                }
            }
        });
    </script>
</body>

</html>
