<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login | EstateMaster</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#252e7e",
                        "background-light": "#f6f6f8",
                        "background-dark": "#13151f",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex items-center justify-center">

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>
    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-white/60 dark:bg-black/60 z-50 hidden items-center justify-center">
        <div class="size-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-4 no-underline">
                <div class="bg-primary p-2 rounded-lg">
                    <span class="material-symbols-outlined text-white">apartment</span>
                </div>
                <span class="text-2xl font-display font-bold tracking-tight text-primary dark:text-white">EstateMaster</span>
            </a>
            <div class="inline-flex items-center gap-2 bg-primary/10 text-primary px-4 py-1.5 rounded-full text-sm font-bold mb-4">
                <span class="material-symbols-outlined text-base">admin_panel_settings</span>
                Admin Portal
            </div>
            <h1 class="text-3xl font-display font-black text-slate-900 dark:text-white mb-2">Admin Login</h1>
            <p class="text-slate-500 dark:text-slate-400">Sign in to manage the platform</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-800">
            <form id="adminLoginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                        <input type="text" id="username" required
                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="admin" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                        <input type="password" id="password" required
                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="••••••••" />
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-xl">admin_panel_settings</span>
                    Sign In as Admin
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="login.html" class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
                    ← Regular User Login
                </a>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
                ← Back to Home
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        // Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
            toast.className = `${colors[type] || colors.info} text-white px-5 py-3 rounded-xl shadow-xl text-sm font-semibold flex items-center gap-2 opacity-0 translate-y-2 transition-all duration-300`;
            const icons = { success: 'check_circle', error: 'error', info: 'info' };
            toast.innerHTML = `<span class="material-symbols-outlined text-base">${icons[type]}</span>${message}`;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('opacity-0', 'translate-y-2'); });
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Check if already logged in as admin
        const existingToken = localStorage.getItem('adminToken');
        if (existingToken) {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('loader').classList.add('flex');

            try {
                const response = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('loader').classList.remove('flex');

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    showToast('Welcome, Administrator!', 'success');
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);
                } else {
                    showToast(data.error || 'Invalid credentials', 'error');
                }
            } catch (error) {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('loader').classList.remove('flex');
                showToast('Connection error. Is the server running?', 'error');
            }
        });
    </script>
</body>

</html>
