<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register | EstateMaster</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#252e7e",
                        "background-light": "#f6f6f8",
                        "background-dark": "#13151f",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-sans min-h-screen flex items-center justify-center py-8">
    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-4 no-underline">
                <div class="bg-primary p-2 rounded-lg">
                    <span class="material-symbols-outlined text-white">apartment</span>
                </div>
                <span
                    class="text-2xl font-display font-bold tracking-tight text-primary dark:text-white">EstateMaster</span>
            </a>
            <h1 class="text-3xl font-display font-black text-slate-900 dark:text-white mb-2">Create Account</h1>
            <p class="text-slate-500 dark:text-slate-400">Join our real estate community</p>
        </div>

        <!-- Register Form -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-800">
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Full Name</label>
                    <input type="text" id="name" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="John Doe" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="you@example.com" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Phone
                        (Optional)</label>
                    <input type="tel" id="phone"
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="555-1234" />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">I am a</label>
                    <select id="role" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="••••••••" />
                    <p class="text-xs text-slate-500 mt-1">Minimum 6 characters</p>
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all mt-6">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account?
                    <a href="login.html" class="text-primary font-semibold hover:underline">Sign in</a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html"
                class="text-sm text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
                ← Back to Home
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;

            if (!isValidEmail(email)) {
                showToast('Please enter a valid email', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            showLoader();

            try {
                const userData = { name, email, password, role };
                if (phone) userData.phone = phone;

                const response = await API.post('/auth/register', userData);

                hideLoader();

                if (response.pendingApproval) {
                    // Show "account under review" card — no redirect, no token
                    const formWrapper = document.querySelector('.bg-white');
                    formWrapper.innerHTML = `
                        <div class="flex flex-col items-center text-center py-4">
                            <div class="size-20 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mb-5">
                                <span class="material-symbols-outlined text-amber-500 text-5xl">pending_actions</span>
                            </div>
                            <h2 class="text-2xl font-display font-black text-slate-900 dark:text-white mb-2">Account Under Review</h2>
                            <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-2">
                                Thank you for signing up, <strong>${name}</strong>!
                            </p>
                            <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6">
                                Your account is currently under review by our admin team. You will be notified once your account is approved and you can sign in.
                            </p>
                            <div class="bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-800 rounded-xl p-4 text-left w-full mb-6">
                                <p class="text-amber-700 dark:text-amber-400 text-xs font-semibold uppercase tracking-wide mb-1">Account Details</p>
                                <p class="text-slate-700 dark:text-slate-300 text-sm"><span class="font-bold">Name:</span> ${name}</p>
                                <p class="text-slate-700 dark:text-slate-300 text-sm"><span class="font-bold">Email:</span> ${email}</p>
                                <p class="text-slate-700 dark:text-slate-300 text-sm"><span class="font-bold">Role:</span> ${role.charAt(0).toUpperCase() + role.slice(1)}</p>
                            </div>
                            <a href="login.html" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:opacity-90 transition-all text-center block">
                                Back to Login
                            </a>
                        </div>
                    `;
                } else {
                    showToast('Registration failed. Please try again.', 'error');
                }
            } catch (error) {
                hideLoader();
                showToast(error.message || 'Registration failed', 'error');
            }
        });
    </script>
</body>

</html>
